version: "2"

linters:
  default: standard
  enable:
    - depguard
    - lll
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    lll:
      line-length: 120
    revive:
      rules:
        - name: blank-imports
          disabled: true
        - name: exported
    depguard:
      rules:
        dependency-purity:
          list-mode: strict
          files:
            - "**/*.go"
          allow:
            - $gostd
            - github.com/google/uuid
            - golang.org/x/crypto
            - github.com/gopherium/gouncer

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/gopherium/gouncer
