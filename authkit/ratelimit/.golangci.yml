version: "2"

linters:
  default: standard
  enable:
    - depguard
    - lll
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    lll:
      line-length: 120
    revive:
      rules:
        - name: blank-imports
          disabled: true
        - name: exported
    depguard:
      rules:
        limiter-purity:
          list-mode: strict
          files:
            - "**/*.go"
          allow:
            - $gostd
            - github.com/go-chi/chi/v5
            - github.com/go-chi/httprate
            - github.com/gopherium/gouncer/authkit/ratelimit

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/gopherium/gouncer
